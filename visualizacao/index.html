<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem Vindo ao Formulário</title>
    <link rel="stylesheet" href="Estilo.css">
</head>
<body>
<footer class="topo">
    <div class="container">
        <img src="img/logo_secretaria_da_educacao.png" alt="Logo Sedex" class="logo-redape">
    </div>
    <ul class="social">
        <li>
            <a href="https://www.facebook.com/">
                <img src="img/i-facebook.png" alt="facebook">
            </a>
        </li>
        <li>
            <a href="https://www.twitter.com/">
            <img src="img/i-twitter.png" alt="twitter">
        </a>
        </li>
        <li>
            <a href="https://www.youtube.com/">
                <img src="img/i-youtube.png" alt="youtube">
            </a>
        </li>
        <li>
            <a href="https://www.linkedin.com/">
                <img src="img/i-linkedin.png" alt="linkedin">
            </a>
        </li>
    </ul>
</footer>
<header class="topo">
    <div id="Logo_Educacao">

    </div>
    <div id="Logo_Imagem">
        <img src="img/logo_gov.png" alt="">
    </div>
    <div id="Logo_Gov">

    </div>
</header>
<div class="login-container">
    <h2>Login</h2>
    <form id="frmLogin" class="form">
        <div id="field">
            <label">Email</label>
            <input class="input" type="email" id="email" placeholder="Insira o seu email">

        </div>
        <div id="field">
            <label>Senha</label>
            <input class="input" type="text" id="senha" placeholder="Insira a sua senha">
        </div>
        <button id="btn" type="submit">
            <span id="btn-text">Entrar</span>
            <span class="loader-dots">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>
    </form>
</div>
    
</body>
</html>
